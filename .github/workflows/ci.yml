name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli-go
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: cli-go/go.mod
          cache-dependency-path: cli-go/go.sum

      - run: go build ./...
      - run: go vet ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@2026.1 -checks=all,-ST1000,-ST1003,-ST1005 ./...
      - run: go test ./... -race -count=1 -cover
